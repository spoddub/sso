version: "2"

run:
  timeout: 5m
  tests: true
  relative-path-mode: gomod
  modules-download-mode: readonly

linters:
  default: none

  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errorlint
    - govet
    - ineffassign
    - misspell
    - nilerr
    - nilnil
    - revive
    - staticcheck
    - unconvert
    - unused

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    revive:
      severity: warning

      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: duplicated-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: unreachable-code
        - name: unused-parameter
          arguments:
            - allow-regex: "^_"
        - name: unused-receiver
          arguments:
            - allow-regex: "^_"
        - name: useless-break
        - name: var-declaration
        - name: waitgroup-by-value

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - std-error-handling

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    gofmt:
      simplify: true

  exclusions:
    generated: lax

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true

output:
  formats:
    text:
      print-linter-name: true
      print-issued-lines: true
      colors: true

  sort-order:
    - file
    - linter